<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoExplorer Pro 2026</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --gc-green: #00873d;
            --gc-dark: #1a1a1a;
            --gc-light: #ffffff;
            --accent: #ff9f43;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--gc-dark); color: white;
            overflow: hidden;
        }

        .header {
            position: absolute; top: 0; width: 100%; height: 60px;
            background: rgba(26, 26, 26, 0.9); backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; z-index: 1001; border-bottom: 2px solid var(--gc-green);
            box-sizing: border-box;
        }

        #map { height: 100vh; width: 100%; z-index: 1; transition: filter 0.5s; }

        /* Filtre pour le mode sombre forcé sur les tuiles */
        .dark-mode-filter .leaflet-tile-container {
            filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%);
        }

        .nav-hud {
            position: absolute; top: 80px; right: 20px; z-index: 1000;
            background: rgba(0, 0, 0, 0.7); padding: 15px; border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1); text-align: center;
        }

        .distance-val { font-size: 1.5rem; font-weight: bold; color: var(--accent); }

        .toolbar {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 1000; display: flex; gap: 10px; width: 90%; justify-content: center;
        }

        .btn {
            background: var(--gc-green); color: white; border: none;
            padding: 12px 15px; border-radius: 12px; font-weight: bold;
            cursor: pointer; flex: 1; max-width: 150px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        .btn-alt { background: #333; }
    </style>
</head>
<body>

    <div class="header">
        <span style="font-weight:bold;">GEO-RADAR v2.6</span>
        <div id="cache-count" style="font-size:0.8rem;">SCAN EN COURS...</div>
    </div>

    <div class="nav-hud">
        <div style="font-size:0.7rem;">PROCHE</div>
        <div class="distance-val" id="dist-val">-- m</div>
    </div>

    <div class="toolbar">
        <button class="btn" onclick="centerOnUser()">🎯 FOCUS</button>
        <button class="btn btn-alt" onclick="toggleDarkMode()">🌓 MODE</button>
        <button class="btn btn-alt" onclick="addWaypoint()">🚩 MARQUEUR</button>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        const map = L.map('map', { zoomControl: false }).setView([47.33, 7.20], 13);
        
        // On garde OSM par défaut
        const tiles = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        const caches = [
            { id: "Cache 1", coords: [47.33508, 7.24507] },
            { id: "Cache 2", coords: [47.33858, 7.18237] },
            { id: "Cache 3", coords: [47.30670, 7.21997] },
            { id: "Cache 4", coords: [47.33115, 7.24157] }
        ];

        const gcIcon = L.divIcon({
            className: '',
            html: `<div style="background:#00873d; width:14px; height:14px; border:2px solid white; transform:rotate(45deg);"></div>`,
            iconSize: [18, 18]
        });

        caches.forEach(c => {
            L.marker(c.coords, {icon: gcIcon}).addTo(map).bindPopup(c.id);
        });

        // Fonction de calcul de distance
        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const φ1 = lat1 * Math.PI/180;
            const φ2 = lat2 * Math.PI/180;
            const Δφ = (lat2-lat1) * Math.PI/180;
            const Δλ = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) + Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ/2) * Math.sin(Δλ/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        let userPos = null;
        let userMarker = L.circleMarker([0,0], { radius: 8, fillColor: "#3498db", color: "white", weight: 2, fillOpacity: 1 }).addTo(map);

        map.on('locationfound', (e) => {
            userPos = e.latlng;
            userMarker.setLatLng(userPos);
            
            let minDist = Infinity;
            caches.forEach(c => {
                const d = getDistance(userPos.lat, userPos.lng, c.coords[0], c.coords[1]);
                if(d < minDist) minDist = d;
            });
            document.getElementById('dist-val').innerText = Math.round(minDist) + " m";
            document.getElementById('cache-count').innerText = "4 CACHES DÉTECTÉES";
        });

        map.locate({watch: true, enableHighAccuracy: true});

        // --- FIX DU MODE SOMBRE ---
        function toggleDarkMode() {
            // On ajoute/enlève une classe au conteneur de la carte
            const mapContainer = document.getElementById('map');
            mapContainer.classList.toggle('dark-mode-filter');
        }

        function addWaypoint() {
            map.once('click', (e) => {
                L.marker(e.latlng, { icon: L.divIcon({ html: "🚩", className: '', iconSize: [25, 25] }) }).addTo(map);
            });
        }

        function centerOnUser() {
            if(userPos) map.flyTo(userPos, 16);
        }
    </script>
</body>
</html>
