<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GeoCache Aventure - Jura</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Alumni+Sans:wght@700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    :root {
      --primary: #2d6a4f;
      --primary-dark: #1b4332;
      --accent: #d4a373;
      --bg-adventure: #f1f3f0;
      --text: #081c15;
      --paper: #fefae0;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-adventure);
      color: var(--text);
    }

    .app {
      display: grid;
      grid-template-columns: 380px 1fr;
      height: 100vh;
    }

    /* BARRE LATERALE THEME AVENTURE */
    .sidebar {
      background: var(--paper);
      background-image: radial-gradient(#d4a37333 1px, transparent 1px);
      background-size: 20px 20px;
      border-right: 3px solid var(--primary-dark);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      z-index: 10;
      box-shadow: 10px 0 20px rgba(0,0,0,0.1);
    }

    .brand h1 { 
      font-family: 'Alumni Sans', sans-serif;
      font-size: 42px; 
      margin: 0; 
      color: var(--primary-dark);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* SYSTEME D'ÉTAPES */
    .steps-nav {
      display: flex;
      justify-content: space-between;
      background: var(--primary-dark);
      padding: 10px;
      border-radius: 8px;
      color: white;
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
    }
    .step { opacity: 0.4; transition: opacity 0.3s; }
    .step.active { opacity: 1; color: var(--accent); }

    .search-box {
      position: relative;
    }
    .search-box input {
      width: 100%;
      padding: 15px;
      border: 2px solid var(--primary-dark);
      border-radius: 5px;
      background: white;
      font-weight: 600;
    }

    /* CARTES DE CACHES */
    .list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 15px;
      padding-right: 5px;
    }

    .card {
      background: white;
      border-left: 5px solid var(--accent);
      padding: 15px;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 4px 4px 0px var(--primary-dark);
    }

    .card:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0px var(--primary-dark); }
    .card.active { 
      border-left: 5px solid var(--primary);
      background: #e9f5db;
    }

    .card h3 { margin: 0 0 5px 0; font-size: 18px; color: var(--primary-dark); }
    .card .location { font-size: 12px; font-weight: 700; color: var(--accent); text-transform: uppercase; }
    
    .card .details-hidden { 
      max-height: 0; 
      overflow: hidden; 
      transition: max-height 0.3s ease; 
      font-size: 13px;
      margin-top: 0;
    }
    .card.active .details-hidden { max-height: 200px; margin-top: 10px; }

    .btn-go {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 15px;
      background: var(--primary-dark);
      color: white;
      text-decoration: none;
      border-radius: 4px;
      font-weight: 800;
      font-size: 12px;
      text-align: center;
    }

    /* MAP */
    .map-container { position: relative; }
    #map { height: 100%; width: 100%; }

    .map-label {
      position: absolute;
      top: 20px;
      right: 20px;
      z-index: 1000;
      background: var(--primary-dark);
      color: white;
      padding: 10px 20px;
      font-weight: 800;
      border-radius: 50px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    /* POPUP STYLING */
    .leaflet-popup-content-wrapper { background: var(--paper); border: 2px solid var(--primary-dark); border-radius: 0; }
    .popup-title { font-weight: 800; color: var(--primary-dark); border-bottom: 1px solid #ccc; margin-bottom: 5px; }

    @media (max-width: 900px) {
      .app { grid-template-columns: 1fr; grid-template-rows: 40vh 60vh; }
      .sidebar { height: 40vh; border-right: none; border-bottom: 3px solid var(--primary-dark); }
    }
  </style>
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <h1>GeoCache Explorer</h1>
      <div class="steps-nav">
        <span id="step-1" class="step active">1. Chercher</span>
        <span id="step-2" class="step">2. Choisir</span>
        <span id="step-3" class="step">3. Partir</span>
      </div>
    </div>

    <div class="search-box">
      <input type="text" id="search-input" placeholder="Où commence l'aventure ?">
    </div>

    <div class="list" id="cache-list">
      </div>
  </aside>

  <main class="map-container">
    <div class="map-label">ZONE D'EXPLORATION : JURA</div>
    <div id="map"></div>
  </main>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  const caches = [
    {
      id: 'gcaxf4t',
      name: 'Bassecourt La cache',
      city: 'Bassecourt',
      coords: [47.335083, 7.245067],
      difficulty: '2/5',
      terrain: '2/5',
      url: 'https://www.geocaching.com/geocache/GCAXF4T',
      desc: 'Une ascension légère offrant une vue imprenable sur le vallon.'
    },
    {
      id: 'gcaxb26',
      name: 'La cache de Glovelier',
      city: 'Glovelier',
      coords: [47.338583, 7.182367],
      difficulty: '2/5',
      terrain: '2/5',
      url: 'https://www.geocaching.com/geocache/GCAXB26',
      desc: 'Cachée sous le couvert des bois jurassiens.'
    },
    {
      id: 'gcawm8n',
      name: 'La cache Sainte-Colombe',
      city: 'Sainte-Colombe',
      coords: [47.3067, 7.219967],
      difficulty: '2/5',
      terrain: '2/5',
      url: 'https://www.geocaching.com/geocache/GCAWM8N',
      desc: 'Suivez le murmure de la Sorne pour débusquer ce trésor.'
    }
  ];

  const map = L.map('map', { zoomControl: false }).setView([47.33, 7.2], 12);
  L.control.zoom({ position: 'bottomright' }).addTo(map);

  L.tileLayer('https://{s}.tile.thunderforest.com/outdoors/{z}/{x}/{y}.png?apikey=YOUR_API_KEY', {
    attribution: '© OpenStreetMap'
  }).addTo(map);
  // Note: Si Thunderforest ne charge pas, on remet OpenStreetMap standard :
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

  const markerIcon = L.divIcon({
    className: 'custom-div-icon',
    html: `<div style="background-color:var(--primary-dark); width:30px; height:30px; border-radius:50% 50% 50% 0; transform:rotate(-45deg); border:2px solid white; display:flex; align-items:center; justify-content:center;">
            <div style="width:10px; height:10px; background:white; border-radius:50%;"></div>
          </div>`,
    iconSize: [30, 30], iconAnchor: [15, 30]
  });

  const listEl = document.getElementById('cache-list');
  const searchInput = document.getElementById('search-input');
  const markers = {};

  function updateSteps(stepNumber) {
    document.querySelectorAll('.step').forEach((s, idx) => {
      s.classList.toggle('active', (idx + 1) <= stepNumber);
    });
  }

  function render(filter = '') {
    listEl.innerHTML = '';
    const filtered = caches.filter(c => c.name.toLowerCase().includes(filter) || c.city.toLowerCase().includes(filter));
    
    if(filter !== '') updateSteps(1);

    filtered.forEach(cache => {
      const card = document.createElement('div');
      card.className = 'card';
      card.id = 'card-' + cache.id;
      card.innerHTML = `
        <div class="location">${cache.city}</div>
        <h3>${cache.name}</h3>
        <div class="details-hidden">
          <p>${cache.desc}</p>
          <div style="display:flex; justify-content:space-between; font-weight:bold; color:var(--primary);">
            <span>Diff: ${cache.difficulty}</span>
            <span>Terr: ${cache.terrain}</span>
          </div>
          <a href="${cache.url}" target="_blank" class="btn-go">DÉBUTER L'AVENTURE ↗</a>
        </div>
      `;

      card.onclick = () => selectCache(cache);
      listEl.appendChild(card);

      // Markers
      const m = L.marker(cache.coords, { icon: markerIcon }).addTo(map);
      m.bindPopup(`<div class="popup-title">${cache.name}</div><button onclick="window.open('${cache.url}')" class="btn-go">Voir la fiche</button>`);
      m.on('click', () => selectCache(cache, false));
      markers[cache.id] = m;
    });
  }

  function selectCache(cache, scroll = true) {
    // UI Update
    document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
    const activeCard = document.getElementById('card-' + cache.id);
    if(activeCard) activeCard.classList.add('active');
    
    if(scroll && activeCard) activeCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

    // Map Update
    map.flyTo(cache.coords, 15);
    markers[cache.id].openPopup();

    // Step Update
    updateSteps(3);
  }

  searchInput.oninput = (e) => render(e.target.value.toLowerCase());

  render();
</script>

</body>
</html>
