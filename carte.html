<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon App Carte Interactive</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        /* CSS : Style de la page et de la carte */
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            background-color: #2c3e50;
            color: white;
            padding: 1rem;
            text-align: center;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        #map {
            flex-grow: 1; /* La carte prend tout l'espace restant */
            width: 100%;
        }

        .custom-popup {
            font-weight: bold;
            color: #e74c3c;
        }
    </style>
</head>
<body>

    <header>
        <h1>Ma Carte Interactive</h1>
    </header>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // JAVASCRIPT : Initialisation de la carte
        
        // 1. On crée la carte centrée sur des coordonnées (ici Paris) avec un zoom de 13
        // Coordonnées : [Latitude, Longitude]
        const map = L.map('map').setView([48.8566, 2.3522], 13);

        // 2. On ajoute une couche de "tuiles" (le dessin de la carte) 
        // Nous utilisons OpenStreetMap qui est gratuit et libre
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        // 3. Ajouter un marqueur à un endroit précis
        const marker = L.marker([48.8566, 2.3522]).addTo(map);

        // 4. Ajouter une bulle d'info (popup) au clic sur le marqueur
        marker.bindPopup("<div class="custom-popup">Bonjour de Paris !</div><br>Ceci est une application HTML/JS.")
              .openPopup();

        // 5. Bonus : Ajouter un marqueur au clic de l'utilisateur sur la carte
        map.on('click', function(e) {
            const newMarker = L.marker([e.latlng.lat, e.latlng.lng]).addTo(map);
            newMarker.bindPopup("Nouveau point : <br>" + e.latlng.toString()).openPopup();
        });
    </script>

</body>
</html>
