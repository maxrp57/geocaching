<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mxrp57 - Geocaching Network</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --gc-green: #00873d;
            --gc-dark: #121212;
            --sidebar-width: 320px;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--gc-dark); color: white; overflow: hidden;
            display: flex;
        }

        /* Barre latérale d'information */
        .sidebar {
            width: var(--sidebar-width);
            background: #fff;
            color: #333;
            display: flex;
            flex-direction: column;
            box-shadow: 5px 0 15px rgba(0,0,0,0.3);
            z-index: 2000;
        }

        .sidebar-header {
            padding: 20px;
            background: var(--gc-green);
            color: white;
        }

        .sidebar-header h2 { margin: 0; font-size: 1.4rem; }
        .sidebar-header p { margin: 5px 0 0; opacity: 0.8; font-size: 0.9rem; }

        .cache-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .cache-item {
            padding: 15px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            transition: background 0.2s;
            border-radius: 8px;
            margin-bottom: 5px;
        }

        .cache-item:hover { background: #f9f9f9; border-left: 4px solid var(--gc-green); }

        .cache-item h3 { margin: 0 0 5px; font-size: 1rem; color: var(--gc-green); }
        .cache-item span { font-size: 0.8rem; color: #666; font-family: monospace; }

        /* Carte */
        #map-container { flex: 1; position: relative; }
        #map { height: 100%; width: 100%; }

        /* HUD & Controls */
        .toolbar {
            position: absolute; bottom: 20px; right: 20px;
            z-index: 1000; display: flex; flex-direction: column; gap: 10px;
        }

        .btn {
            background: var(--gc-green); color: white; border: none;
            padding: 12px; border-radius: 10px; font-weight: bold;
            cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        @media (max-width: 768px) {
            .sidebar { display: none; } /* On cache la sidebar sur mobile pour la lisibilité */
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <h2>Mxrp57</h2>
            <p id="total-count">Chargement des caches...</p>
        </div>
        <div class="cache-list" id="list-container">
            </div>
    </div>

    <div id="map-container">
        <div id="map"></div>
        
        <div class="toolbar">
            <button class="btn" onclick="centerOnUser()">🎯 MA POSITION</button>
            <button class="btn" onclick="toggleMapMode()" style="background:#333;">🌓 CHANGER VUE</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        const map = L.map('map', { zoomControl: false }).setView([47.33, 7.20], 13);
        
        // Modes de carte
        const layers = {
            "Plan": L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map),
            "Satellite": L.tileLayer('https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { subdomains:['mt0','mt1','mt2','mt3'] })
        };

        let currentLayer = "Plan";
        function toggleMapMode() {
            map.removeLayer(layers[currentLayer]);
            currentLayer = (currentLayer === "Plan") ? "Satellite" : "Plan";
            layers[currentLayer].addTo(map);
        }

        // --- DATA DES CACHES DE Mxrp57 ---
        const caches = [
            { id: "MX-01", name: "La Sentinelle du Jura", coords: [47.33508, 7.24507], diff: "2/5", type: "Traditionnelle" },
            { id: "MX-02", name: "Le Passage Secret", coords: [47.33858, 7.18237], diff: "3.5/5", type: "Multi-cache" },
            { id: "MX-03", name: "L'Echo de l'Eau", coords: [47.30670, 7.21997], diff: "1/5", type: "Traditionnelle" },
            { id: "MX-04", name: "L'Urbaine Perdue", coords: [47.33115, 7.24157], diff: "2.5/5", type: "Mystère" }
        ];

        document.getElementById('total-count').innerText = `${caches.length} caches publiées`;

        const gcIcon = L.divIcon({
            className: '',
            html: `<div style="background:#00873d; width:18px; height:18px; border:2px solid white; transform:rotate(45deg); box-shadow:0 0 8px rgba(0,0,0,0.4);"></div>`,
            iconSize: [20, 20]
        });

        const listContainer = document.getElementById('list-container');

        caches.forEach(cache => {
            // Ajouter marqueur sur la carte
            const marker = L.marker(cache.coords, {icon: gcIcon}).addTo(map);
            marker.bindPopup(`<b>${cache.name}</b><br>Difficulté: ${cache.diff}<br>Type: ${cache.type}`);

            // Ajouter item dans la barre latérale
            const item = document.createElement('div');
            item.className = 'cache-item';
            item.innerHTML = `
                <h3>${cache.name}</h3>
                <span>ID: ${cache.id} • ${cache.type}</span><br>
                <small>Difficulté: ${cache.diff}</small>
            `;
            item.onclick = () => {
                map.flyTo(cache.coords, 16);
                marker.openPopup();
            };
            listContainer.appendChild(item);
        });

        // Localisation
        let userPos = null;
        let userMarker = L.circleMarker([0,0], { radius: 8, fillColor: "#3498db", color: "white", weight: 3, fillOpacity: 1 }).addTo(map);

        map.on('locationfound', (e) => {
            userPos = e.latlng;
            userMarker.setLatLng(userPos);
        });
        map.locate({watch: true, enableHighAccuracy: true});

        function centerOnUser() {
            if(userPos) map.flyTo(userPos, 16);
            else alert("Recherche de votre position GPS...");
        }
    </script>
</body>
</html></html>
