<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenue</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 id="welcome">Bienvenue</h1>
    </div>

    <script>
        // Animation JS simple : changement de couleur et apparition lettre par lettre
        const text = document.getElementById('welcome');
        const str = text.textContent;
        text.textContent = '';
        let i = 0;

        function animateText() {
            if (i < str.length) {
                text.textContent += str.charAt(i);
                i++;
                setTimeout(animateText, 150);
            }
        }

        window.onload = animateText;
    </script>
</body>
</html>
